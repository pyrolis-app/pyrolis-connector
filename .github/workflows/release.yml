name: Build & Release Connector

on:
  push:
    tags:
      - "pyrolis-connector-v*"

permissions:
  contents: write

env:
  MIX_ENV: prod
  ELIXIR_VERSION: "1.17.3"
  OTP_VERSION: "27.1"

jobs:
  build:
    name: Build ${{ matrix.os_name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os_name: linux
            target_triple: x86_64-linux
          - runner: windows-latest
            os_name: windows
            target_triple: x86_64-windows

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install system dependencies (Linux)
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ matrix.os_name }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ matrix.os_name }}-

      - name: Build release
        shell: bash
        run: |
          mix deps.get
          mix release --overwrite

      - name: Package release (Linux)
        if: matrix.os_name == 'linux'
        run: |
          cd _build/prod/rel
          zip -r ../../../pyrolis-connector-${{ matrix.target_triple }}.zip pyrolis_connector/

      - name: Package release (Windows)
        if: matrix.os_name == 'windows'
        shell: powershell
        run: |
          Compress-Archive -Path _build/prod/rel/pyrolis_connector/* -DestinationPath pyrolis-connector-${{ matrix.target_triple }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyrolis-connector-${{ matrix.target_triple }}
          path: pyrolis-connector-${{ matrix.target_triple }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#pyrolis-connector-v}" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts with version
        run: |
          cd release
          for f in pyrolis-connector-*.zip; do
            new_name=$(echo "$f" | sed "s/pyrolis-connector-/pyrolis-connector-${{ steps.version.outputs.VERSION }}-/")
            mv "$f" "$new_name"
          done

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Pyrolis Connector v${{ steps.version.outputs.VERSION }}
          body: |
            ## Pyrolis Connector v${{ steps.version.outputs.VERSION }}

            ### Installation

            **Linux:**
            ```bash
            unzip pyrolis-connector-*-linux.zip
            cd pyrolis_connector
            bin/pyrolis_connector start
            ```

            **Windows:**
            Extract the zip and run:
            ```
            bin\pyrolis_connector.bat start
            ```

            ### Running as a service

            **Linux (systemd):**
            ```bash
            bin/pyrolis_connector daemon
            ```

            **Windows:**
            ```
            bin\pyrolis_connector.bat install
            bin\pyrolis_connector.bat start
            ```

            ### Checksums
            See `SHA256SUMS.txt` for file integrity verification.
          files: release/*
          draft: false
          prerelease: false
