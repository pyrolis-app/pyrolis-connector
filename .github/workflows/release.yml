name: Build & Release Connector

on:
  push:
    tags:
      - "pyrolis-connector-v*"

permissions:
  contents: write

env:
  MIX_ENV: prod
  ELIXIR_VERSION: "1.17.3"
  OTP_VERSION: "27.1"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target: [linux, windows]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev xz-utils p7zip-full
          curl -L https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz | tar -xJ
          sudo mv zig-x86_64-linux-0.15.2/zig /usr/local/bin/
          sudo mv zig-x86_64-linux-0.15.2/lib /usr/local/lib/zig

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ matrix.target }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ matrix.target }}-

      - name: Build release
        env:
          BURRITO_TARGET: ${{ matrix.target }}
        run: |
          mix deps.get
          mix release --overwrite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyrolis-connector-${{ matrix.target }}-x86_64
          path: burrito_out/pyrolis_connector_${{ matrix.target }}*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#pyrolis-connector-v}" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts
        run: |
          cd release
          for f in pyrolis_connector_*; do
            new_name=$(echo "$f" | sed "s/pyrolis_connector_/pyrolis-connector-${{ steps.version.outputs.VERSION }}-/")
            mv "$f" "$new_name"
          done
          chmod +x pyrolis-connector-*-linux* 2>/dev/null || true

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Pyrolis Connector v${{ steps.version.outputs.VERSION }}
          body: |
            ## Pyrolis Connector v${{ steps.version.outputs.VERSION }}

            ### Installation

            **Linux:**
            ```bash
            chmod +x pyrolis-connector-*-linux
            ./pyrolis-connector-*-linux setup
            ```

            **Windows:**
            Download the `.exe` file and run:
            ```
            pyrolis-connector-*.exe setup
            ```

            ### Checksums
            See `SHA256SUMS.txt` for file integrity verification.
          files: release/*
          draft: false
          prerelease: false
